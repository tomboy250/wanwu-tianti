<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万物天梯 · 完整版</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --accent: #0a84ff; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .search { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #2c2c2e; color: #fff; box-sizing: border-box; margin-bottom: 20px; }
        .item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .score { color: #ffd60a; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align:center">万物天梯</h1>
    <input type="text" class="search" placeholder="输入关键字搜索..." oninput="filter()">
    <div id="list"></div>
    <script>
        const items = [
            {n: "iPhone 16 Pro", c: "电子", s: 9.8}, {n: "MacBook Pro M3", c: "电脑", s: 9.9},
            {n: "Sony WH-1000XM5", c: "音频", s: 9.7}, {n: "Herman Miller Embody", c: "居家", s: 9.8},
            {n: "MX Master 3S", c: "办公", s: 9.6}, {n: "AirPods Pro 2", c: "音频", s: 9.5},
            {n: "DJI Mavic 3 Pro", c: "数码", s: 9.9}, {n: "Nintendo Switch OLED", c: "游戏", s: 9.4},
            {n: "Kindle Oasis", c: "阅读", s: 9.2}, {n: "Dyson V15", c: "居家", s: 9.3}
        ];
        function render(arr) {
            document.getElementById('list').innerHTML = arr.map(i => 
                `<div class="item"><span>${i.n} <small style="color:#888">[${i.c}]</small></span><span class="score">${i.s}</span></div>`
            ).join('');
        }
        function filter() {
            const v = document.querySelector('.search').value.toLowerCase();
            render(items.filter(i => i.n.toLowerCase().includes(v) || i.c.includes(v)));
        }
        render(items);
    </script>
</body>
</html>
